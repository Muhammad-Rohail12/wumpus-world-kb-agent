<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Wumpus World · KB Agent · Amber Crypt</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ========== DARK BROWN THEME (same as before) ========== */
  :root {
    --bg-0: #0a0502; --bg-1: #120a05; --bg-2: #1b110a; --bg-3: #251a10;
    --b1: rgba(200,150,100,0.12); --b2: rgba(200,150,100,0.2);
    --cyan: #e0a46b; --green: #b59a6b; --amber: #f5bc70; --red: #c45a42;
    --text-1: #f2e2cc; --text-2: #cbad8a; --text-3: #8a6e4e;
    --mono: 'JetBrains Mono', monospace; --ui: 'DM Sans', sans-serif; --head: 'Syne', sans-serif;
    --cell: 78px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--ui); background: var(--bg-0); color: var(--text-1);
    height: 100vh; display: grid; grid-template-rows: 56px 1fr; overflow: hidden;
  }
  .topbar {
    background: var(--bg-1); border-bottom: 1px solid var(--b2);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
  }
  .logo {
    font-family: var(--head); font-size: 1.05rem; font-weight: 800;
    background: linear-gradient(135deg, var(--cyan), var(--amber));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .badge {
    font-family: var(--mono); font-size: 0.58rem; padding: 3px 9px;
    border-radius: 100px; border: 1px solid;
  }
  .b-cyan { color: var(--cyan); border-color: rgba(224,164,107,0.3); }
  .ml-auto { margin-left: auto; display: flex; gap: 10px; }
  .layout { display: grid; grid-template-columns: 1fr 360px; overflow: hidden; }
  .left-panel {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    padding: 24px; overflow-y: auto;
    background: radial-gradient(ellipse at 30% 60%, rgba(224,164,107,0.04), transparent);
  }
  .grid-container-wrap {
    background: rgba(0,0,0,0.25); border: 1px solid var(--b2); border-radius: 14px; padding: 10px;
  }
  #game-grid { display: grid; gap: 6px; }
  .cell {
    width: var(--cell); height: var(--cell); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; background: #1c140c; border: 1px solid rgba(200,150,100,0.15);
  }
  .cell-agent { background: linear-gradient(135deg, #3f2c1c, #2b1f13); border: 2px solid var(--cyan); }
  .cell-visited { background: #2a241a; border-color: #b59a6b; }
  .cell-safe-inferred { background: #2a2a1c; border: 1px dashed #b59a6b; }
  .cell-pit { background: #2a1410; border-color: var(--red); }
  .cell-wumpus { background: #251a1f; border-color: #b58a6b; }
  .cell-gold { background: #2f2612; border-color: var(--amber); }
  .cell-danger { background: #2a1f12; border: 1px dashed #f5bc70; }
  .cell-coord { position: absolute; top: 2px; left: 4px; font-size: 0.35rem; color: #8a6e4e; }
  .cell-icon { font-size: 1.5rem; }
  .cell-label { font-size: 0.4rem; margin-top: 2px; }
  .cell-percepts { position: absolute; bottom: 2px; right: 4px; font-size: 0.55rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.6rem; }
  .log-section {
    width: 100%; background: var(--bg-2); border-radius: 12px; border: 1px solid var(--b2);
    margin-top: 8px; display: flex; flex-direction: column;
  }
  .log-header { display: flex; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--b1); }
  .log-title { font-family: var(--mono); font-size: 0.55rem; color: var(--cyan); }
  .log-clear { background: none; border: none; color: #8a6e4e; cursor: pointer; }
  .log-body { height: 200px; overflow-y: auto; padding: 10px; font-family: var(--mono); font-size: 0.6rem; }
  .log-entry { display: flex; gap: 8px; padding: 2px 0; }
  .log-time { color: #8a6e4e; }
  .log-entry.move .log-msg { color: #b59a6b; }
  .log-entry.win .log-msg { color: #f5bc70; font-weight: bold; }
  .right-panel { background: var(--bg-1); border-left: 1px solid var(--b2); overflow-y: auto; }
  .pane { padding: 16px; border-bottom: 1px solid var(--b1); }
  .pane-title { font-family: var(--mono); font-size: 0.55rem; color: var(--cyan); margin-bottom: 12px; }
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .field input { width: 100%; background: var(--bg-0); border: 1px solid var(--b2); color: var(--text-1); padding: 6px; border-radius: 6px; }
  .btns { display: flex; gap: 8px; }
  .btn { font-family: var(--mono); padding: 8px 12px; border-radius: 6px; cursor: pointer; border: 1px solid; background: transparent; flex: 1; }
  .btn-new { border-color: var(--cyan); color: var(--cyan); }
  .btn-auto { border-color: var(--green); color: var(--green); }
  .btn-pause { border-color: var(--amber); color: var(--amber); }
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric-card { background: var(--bg-2); border-radius: 8px; padding: 8px; text-align: center; }
  .metric-val { font-family: var(--head); font-size: 1.5rem; }
  .percept-row { display: flex; gap: 8px; margin: 8px 0; }
  .status-bar { background: var(--bg-0); border-radius: 8px; padding: 8px; font-family: monospace; margin: 8px 0; }
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    :root { --cell: 60px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⬡ WUMPUS WORLD</div>
  <div class="ml-auto">
    <span class="badge b-cyan">Knowledge-Based Agent</span>
  </div>
</div>

<div class="layout">
  <!-- LEFT PANEL: Grid + Legend + Log -->
  <div class="left-panel">
    <div id="status-banner" class="status-banner"></div>
    <div class="grid-container-wrap">
      <div id="game-grid"></div>
    </div>
    <div class="legend">
      <div class="legend-item">🤖 Agent &nbsp; ✓ Visited &nbsp; ◈ Safe &nbsp; 🕳️ Pit &nbsp; 👹 Wumpus &nbsp; 💰 Gold</div>
    </div>
    <div class="log-section">
      <div class="log-header"><span class="log-title">📜 Move Log</span><button class="log-clear" id="clearLogBtn">clear</button></div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>

  <!-- RIGHT PANEL: Controls + Metrics -->
  <div class="right-panel">
    <div class="pane">
      <div class="pane-title">⚙️ Config</div>
      <div class="config-grid">
        <div class="field"><label>ROWS</label><input type="number" id="rowsInput" value="4" min="3" max="6"></div>
        <div class="field"><label>COLS</label><input type="number" id="colsInput" value="4" min="3" max="6"></div>
        <div class="field"><label>PITS</label><input type="number" id="pitsInput" value="3" min="1" max="6"></div>
        <div class="field"><label>SPEED</label><input type="number" id="speedInput" value="600" min="200" max="1500"></div>
      </div>
      <div class="btns">
        <button class="btn btn-new" id="newGameBtn">🌲 NEW</button>
        <button class="btn btn-auto" id="autoBtn" disabled>▶ AUTO</button>
        <button class="btn btn-step" id="stepBtn" disabled>⟳ STEP</button>
      </div>
    </div>
    <div class="pane">
      <div class="pane-title">📊 Metrics</div>
      <div class="metrics-grid">
        <div class="metric-card"><div class="metric-val" id="infSteps">0</div><div>Inf. Steps</div></div>
        <div class="metric-card"><div class="metric-val" id="moveCount">0</div><div>Moves</div></div>
        <div class="metric-card"><div class="metric-val" id="safeCount">0</div><div>Safe</div></div>
        <div class="metric-card"><div class="metric-val" id="kbSize">0</div><div>KB</div></div>
      </div>
    </div>
    <div class="pane">
      <div class="pane-title">👁️ Percepts</div>
      <div class="percept-row" id="perceptRow">—</div>
      <div class="status-bar" id="agentStatusBar"></div>
      <div class="kb-preview" id="kbPreview">—</div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  //  FULL SELF-CONTAINED WUMPUS WORLD (NO BACKEND)
  //  Uses model checking inference. Works on Vercel.
  // ============================================================
  class WumpusWorld {
    constructor(rows, cols, numPits) {
      this.rows = rows; this.cols = cols;
      this.numPits = Math.min(numPits, rows*cols - 3);
      this.grid = Array(rows).fill().map(() => Array(cols).fill().map(() => ({
        hasPit: false, hasWumpus: false, hasGold: false, visited: false,
        breeze: false, stench: false, glitter: false, safe: false, unsafe: false
      })));
      this.agent = { r: 0, c: 0 }; this.alive = true; this.won = false; this.stuck = false;
      this.moves = 0; this.inferences = 0;
      this.kb = new Set(); this.safeSet = new Set(); this.unsafeSet = new Set(); this.visitedSet = new Set();
      this.generateWorld(); this.initKB(); this.updatePerceptsFromWorld();
      this.visitedSet.add("0,0"); this.safeSet.add("0,0"); this.addPerceptFact(0,0);
      this.updateInferences();
    }
    generateWorld() {
      let free = [];
      for(let i=0;i<this.rows;i++) for(let j=0;j<this.cols;j++) if(!(i===0&&j===0)) free.push([i,j]);
      for(let i=free.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [free[i],free[j]]=[free[j],free[i]]; }
      let idx=0;
      let [wr,wc]=free[idx++]; this.grid[wr][wc].hasWumpus=true;
      for(let p=0;p<this.numPits;p++){ let [pr,pc]=free[idx++]; this.grid[pr][pc].hasPit=true; }
      let [gr,gc]=free[idx++];
      while(this.grid[gr][gc].hasPit || this.grid[gr][gc].hasWumpus){ [gr,gc]=free[idx++]; }
      this.grid[gr][gc].hasGold=true;
    }
    updatePerceptsFromWorld() {
      for(let i=0;i<this.rows;i++) for(let j=0;j<this.cols;j++){
        this.grid[i][j].breeze = this.hasAdjacentPit(i,j);
        this.grid[i][j].stench = this.hasAdjacentWumpus(i,j);
        if(this.grid[i][j].hasGold) this.grid[i][j].glitter=true;
      }
    }
    hasAdjacentPit(r,c){ const dirs=[[-1,0],[1,0],[0,-1],[0,1]]; for(let [dr,dc] of dirs){ let nr=r+dr,nc=c+dc; if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&this.grid[nr][nc].hasPit) return true; } return false; }
    hasAdjacentWumpus(r,c){ const dirs=[[-1,0],[1,0],[0,-1],[0,1]]; for(let [dr,dc] of dirs){ let nr=r+dr,nc=c+dc; if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&this.grid[nr][nc].hasWumpus) return true; } return false; }
    initKB(){ this.kb.add("NoPit_0_0"); this.kb.add("NoWumpus_0_0"); }
    addPerceptFact(r,c){
      let cell=this.grid[r][c];
      if(cell.breeze) this.kb.add(`Breeze_${r}_${c}`); else this.kb.add(`~Breeze_${r}_${c}`);
      if(cell.stench) this.kb.add(`Stench_${r}_${c}`); else this.kb.add(`~Stench_${r}_${c}`);
      if(cell.glitter) this.kb.add(`Glitter_${r}_${c}`);
      this.inferences++;
    }
    checkConsistent(r,c,isPit){
      let relevant=new Set(); relevant.add(`${r},${c}`);
      for(let vis of this.visitedSet){
        let [vr,vc]=vis.split(',').map(Number);
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        for(let [dr,dc] of dirs){ let nr=vr+dr,nc=vc+dc; if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.visitedSet.has(`${nr},${nc}`)) relevant.add(`${nr},${nc}`); }
      }
      let cellList=Array.from(relevant).map(s=>s.split(',').map(Number));
      if(cellList.length>18) return true;
      let n=cellList.length;
      for(let mask=0;mask<(1<<n);mask++){
        let assign=new Map();
        for(let i=0;i<n;i++){ let [rr,cc]=cellList[i]; assign.set(`${rr},${cc}`, (mask>>i)&1); }
        assign.set(`${r},${c}`, isPit);
        let ok=true;
        for(let fact of this.kb){
          if(!this.evalFact(fact,assign)){ ok=false; break; }
        }
        for(let vis of this.visitedSet) if(assign.get(vis)===true){ ok=false; break; }
        for(let uns of this.unsafeSet) if(assign.get(uns)===false){ ok=false; break; }
        if(ok) return true;
      }
      return false;
    }
    evalFact(fact,assign){
      if(fact.startsWith("NoPit")||fact.startsWith("NoWumpus")) return true;
      let neg=fact.startsWith("~");
      let pred=neg?fact.slice(1):fact;
      if(pred.startsWith("Breeze_")){
        let m=pred.match(/Breeze_(\d+)_(\d+)/); if(!m) return true;
        let r=parseInt(m[1]),c=parseInt(m[2]);
        let breeze=false;
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        for(let [dr,dc] of dirs){ let nr=r+dr,nc=c+dc; if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&assign.get(`${nr},${nc}`)===true) breeze=true; }
        return neg?!breeze:breeze;
      }
      if(pred.startsWith("Stench_")){
        let m=pred.match(/Stench_(\d+)_(\d+)/); if(!m) return true;
        let r=parseInt(m[1]),c=parseInt(m[2]);
        let st=this.grid[r][c].stench;
        return neg?!st:st;
      }
      return true;
    }
    updateInferences(){
      let frontier=new Set();
      for(let vis of this.visitedSet){
        let [vr,vc]=vis.split(',').map(Number);
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        for(let [dr,dc] of dirs){ let nr=vr+dr,nc=vc+dc; if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.visitedSet.has(`${nr},${nc}`)) frontier.add(`${nr},${nc}`); }
      }
      for(let f of frontier){
        let [fr,fc]=f.split(',').map(Number);
        let canPit=this.checkConsistent(fr,fc,true);
        let canSafe=this.checkConsistent(fr,fc,false);
        if(!canPit&&canSafe){ this.safeSet.add(f); this.grid[fr][fc].safe=true; }
        else if(canPit&&!canSafe){ this.unsafeSet.add(f); this.grid[fr][fc].unsafe=true; }
      }
    }
    getCurrentPercepts(){ let cell=this.grid[this.agent.r][this.agent.c]; return {breeze:cell.breeze,stench:cell.stench,glitter:cell.glitter}; }
    moveTo(nr,nc){
      if(!this.alive||this.won) return false;
      this.agent.r=nr; this.agent.c=nc; this.moves++;
      let key=`${nr},${nc}`; this.visitedSet.add(key); this.grid[nr][nc].visited=true;
      let cell=this.grid[nr][nc]; this.addPerceptFact(nr,nc);
      if(cell.hasPit){ this.alive=false; return false; }
      if(cell.hasWumpus){ this.alive=false; return false; }
      if(cell.hasGold){ this.won=true; return true; }
      this.updateInferences(); return true;
    }
    getNextMove(){
      if(this.won||!this.alive) return null;
      let candidates=[];
      for(let vis of this.visitedSet){
        let [vr,vc]=vis.split(',').map(Number);
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        for(let [dr,dc] of dirs){
          let nr=vr+dr,nc=vc+dc;
          if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!this.visitedSet.has(`${nr},${nc}`)){
            if(this.safeSet.has(`${nr},${nc}`)||(!this.unsafeSet.has(`${nr},${nc}`))) candidates.push([nr,nc]);
          }
        }
      }
      if(candidates.length===0){ this.stuck=true; return null; }
      let q=[{r:this.agent.r,c:this.agent.c,path:[]}], seen=new Set(); seen.add(`${this.agent.r},${this.agent.c}`);
      while(q.length){
        let {r,c,path}=q.shift();
        if(candidates.some(([fr,fc])=>fr===r&&fc===c)) return path.length===0?[r,c]:path[0];
        const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
        for(let [dr,dc] of dirs){
          let nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<this.rows&&nc>=0&&nc<this.cols&&!seen.has(`${nr},${nc}`)){
            let key=`${nr},${nc}`;
            if(this.visitedSet.has(key)||this.safeSet.has(key)||(!this.unsafeSet.has(key))){
              seen.add(key); q.push({r:nr,c:nc,path:[...path,[nr,nc]]});
            }
          }
        }
      }
      return null;
    }
    step(){
      if(this.won||!this.alive||this.stuck) return {type:this.won?"won":(this.alive?(this.stuck?"stuck":"done"):"died")};
      let move=this.getNextMove();
      if(!move){ this.stuck=true; return {type:"stuck"}; }
      let [nr,nc]=move;
      let gold=this.moveTo(nr,nc);
      if(!this.alive) return {type:"died",r:nr,c:nc};
      if(gold) return {type:"won"};
      return {type:"move",r:nr,c:nc};
    }
    getState(){
      let gridRep=[];
      for(let i=0;i<this.rows;i++){
        let row=[];
        for(let j=0;j<this.cols;j++){
          let cell=this.grid[i][j];
          row.push({
            r:i,c:j,has_pit:cell.hasPit,has_wumpus:cell.hasWumpus,has_gold:cell.hasGold,
            is_visited:this.visitedSet.has(`${i},${j}`),is_safe:this.safeSet.has(`${i},${j}`),
            is_unsafe:this.unsafeSet.has(`${i},${j}`),breeze:cell.breeze,stench:cell.stench,
            glitter:cell.glitter,is_agent:(i===this.agent.r&&j===this.agent.c&&this.alive&&!this.won)
          });
        }
        gridRep.push(row);
      }
      return {
        rows:this.rows,cols:this.cols,grid:gridRep,
        agent_row:this.agent.r,agent_col:this.agent.c,
        agent_status:this.won?"won":(!this.alive?"dead":(this.stuck?"stuck":"active")),
        moves:this.moves,inf_steps:this.inferences,safe_count:this.safeSet.size,
        kb_size:this.kb.size,current_percepts:this.getCurrentPercepts(),
        visited_count:this.visitedSet.size,unsafe_count:this.unsafeSet.size,
        done:(this.won||!this.alive||this.stuck),kb_recent:Array.from(this.kb).slice(-3)
      };
    }
  }

  // UI Controller
  let currentGame=null, autoActive=false, stepRunning=false;
  function addLog(level,msg){
    let logDiv=document.getElementById('logBody');
    let entry=document.createElement('div'); entry.className=`log-entry ${level}`;
    let time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    entry.innerHTML=`<span class="log-time">${time}</span><span class="log-msg">${msg}</span>`;
    logDiv.appendChild(entry); entry.scrollIntoView({block:'nearest'});
    while(logDiv.children.length>200) logDiv.removeChild(logDiv.firstChild);
  }
  function updateUI(){
    if(!currentGame) return;
    let s=currentGame.getState();
    let gridDiv=document.getElementById('game-grid');
    gridDiv.style.gridTemplateColumns=`repeat(${s.cols}, var(--cell))`;
    gridDiv.innerHTML='';
    for(let i=0;i<s.rows;i++) for(let j=0;j<s.cols;j++){
      let cell=s.grid[i][j];
      let cls='cell',icon='·',label='';
      if(cell.is_agent){ cls+=' cell-agent'; icon='🤖'; label='AG'; }
      else if(cell.is_visited&&cell.is_unsafe){ cls+=' cell-pit'; icon='🕳️'; }
      else if(cell.has_pit&&s.done){ cls+=' cell-pit'; icon='🕳️'; }
      else if(cell.has_wumpus&&s.done){ cls+=' cell-wumpus'; icon='👹'; }
      else if(cell.has_gold&&s.done){ cls+=' cell-gold'; icon='💰'; }
      else if(cell.is_visited){ cls+=' cell-visited'; icon='✓'; }
      else if(cell.is_unsafe){ cls+=' cell-danger'; icon='⚠️'; }
      else if(cell.is_safe){ cls+=' cell-safe-inferred'; icon='◈'; }
      else cls+=' cell-unknown';
      let perc='';
      if(cell.is_visited&&!cell.is_agent){
        if(cell.breeze) perc+='💨'; if(cell.stench) perc+='🌫️'; if(cell.glitter) perc+='✨';
      }
      let div=document.createElement('div'); div.className=cls;
      div.innerHTML=`<span class="cell-coord">${cell.r},${cell.c}</span><span class="cell-icon">${icon}</span>${label?`<span class="cell-label">${label}</span>`:''}${perc?`<div class="cell-percepts">${perc}</div>`:''}`;
      gridDiv.appendChild(div);
    }
    document.getElementById('infSteps').innerText=s.inf_steps;
    document.getElementById('moveCount').innerText=s.moves;
    document.getElementById('safeCount').innerText=s.safe_count;
    document.getElementById('kbSize').innerText=s.kb_size;
    let p=s.current_percepts;
    let percDiv=document.getElementById('perceptRow');
    percDiv.innerHTML='';
    if(!p.breeze&&!p.stench&&!p.glitter) percDiv.innerHTML='<span>— no percept —</span>';
    else{ if(p.breeze) percDiv.innerHTML+='💨 BREEZE '; if(p.stench) percDiv.innerHTML+='👃 STENCH '; if(p.glitter) percDiv.innerHTML+='✨ GLITTER'; }
    document.getElementById('agentStatusBar').innerHTML=`📍 (${s.agent_row},${s.agent_col}) · ${s.agent_status.toUpperCase()} · moves:${s.moves}`;
    document.getElementById('kbPreview').innerText=(s.kb_recent||[]).join('\n')||'—';
  }
  async function stepGame(){
    if(!currentGame||stepRunning) return;
    let state=currentGame.getState();
    if(state.done){ if(autoActive) stopAuto(); return; }
    stepRunning=true;
    let result=currentGame.step();
    let newState=currentGame.getState();
    if(result.type==='move') addLog('move',`→ moved to (${result.r},${result.c})`);
    else if(result.type==='died'){ addLog('danger','☠️ Died (pit/wumpus)'); stopAuto(); }
    else if(result.type==='won'){ addLog('win','✨ GOLD FOUND! Victory! ✨'); stopAuto(); }
    else if(result.type==='stuck'){ addLog('danger','⚠️ STUCK: no safe moves'); stopAuto(); }
    updateUI();
    stepRunning=false;
    if(autoActive&&!newState.done){
      let speed=parseInt(document.getElementById('speedInput').value);
      setTimeout(()=>{ if(autoActive) stepGame(); }, speed);
    }
  }
  function newGame(){
    stopAuto();
    let rows=Math.min(6,Math.max(3,parseInt(document.getElementById('rowsInput').value)));
    let cols=Math.min(6,Math.max(3,parseInt(document.getElementById('colsInput').value)));
    let pits=Math.min(rows*cols-3,Math.max(1,parseInt(document.getElementById('pitsInput').value)));
    document.getElementById('rowsInput').value=rows;
    document.getElementById('colsInput').value=cols;
    document.getElementById('pitsInput').value=pits;
    currentGame=new WumpusWorld(rows,cols,pits);
    addLog('info',`🌲 New game ${rows}x${cols}, pits:${pits}`);
    updateUI();
    document.getElementById('autoBtn').disabled=false;
    document.getElementById('stepBtn').disabled=false;
  }
  function toggleAuto(){ autoActive?stopAuto():startAuto(); }
  function startAuto(){
    if(!currentGame||currentGame.getState().done) return;
    autoActive=true;
    let btn=document.getElementById('autoBtn');
    btn.innerText='⏸ PAUSE'; btn.classList.add('btn-pause');
    stepGame();
  }
  function stopAuto(){
    autoActive=false;
    let btn=document.getElementById('autoBtn');
    if(btn){ btn.innerText='▶ AUTO'; btn.classList.remove('btn-pause'); }
  }
  document.getElementById('newGameBtn').onclick=newGame;
  document.getElementById('autoBtn').onclick=toggleAuto;
  document.getElementById('stepBtn').onclick=()=>{ if(!autoActive&&currentGame&&!currentGame.getState().done) stepGame(); };
  document.getElementById('clearLogBtn').onclick=()=>{ document.getElementById('logBody').innerHTML=''; addLog('info','Log cleared'); };
  window.onload=()=>{ newGame(); };
</script>
</body>
</html>
